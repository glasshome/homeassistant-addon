name: "GlassHome Dashboard (Edge)"
version: "0.9.0-beta.1"
slug: glasshome-edge
description: "Early builds of GlassHome for testing. Use the stable version for daily use."
url: "https://github.com/glasshome/glasshome-addon"
stage: experimental
arch:
  - amd64
  - aarch64
init: false
ingress: false
panel_icon: mdi:view-dashboard
startup: application
boot: auto
ports:
  3124/tcp: 3124
ports_description:
  3124/tcp: "Web interface (Edge)"
environment:
  PORT: "3124"
map:
  - data:rw
options:
  log_level: info
schema:
  log_level: list(debug|info|warning|error)
image: "ghcr.io/glasshome/{arch}-glasshome"
