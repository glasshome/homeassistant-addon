name: Verify addon images

# Each channel's config.yaml pins image + version. Home Assistant pulls
# `image:version` directly, so a config that points at an unpublished tag
# fails on every user's box with "[404] manifest unknown". This gate refuses
# to let such a config land on main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Verify each channel's image is published
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check every channel config points at a real image
        run: |
          fail=0
          for cfg in */config.yaml; do
            version=$(grep '^version:' "$cfg" | sed 's/version: *"\(.*\)"/\1/')
            image=$(grep '^image:' "$cfg" | sed 's/image: *"\(.*\)"/\1/')
            if [ -z "$image" ] || [ -z "$version" ]; then
              echo "::error file=$cfg::missing image or version field"
              fail=1
              continue
            fi
            # HA substitutes {arch} at install time; expand it against the
            # channel's arch list so each per-arch tag is checked for real.
            if [[ "$image" == *"{arch}"* ]]; then
              archs=$(sed -n '/^arch:/,/^[^ -]/p' "$cfg" | grep -o '^  *- *.*' | sed 's/^  *- *//')
            else
              archs="_single"
            fi
            for arch in $archs; do
              ref="${image/\{arch\}/$arch}:${version}"
              if docker manifest inspect "$ref" >/dev/null 2>&1; then
                echo "ok: $ref ($cfg)"
              else
                echo "::error file=$cfg::$ref is not published. Build and publish the image before bumping this channel."
                fail=1
              fi
            done
          done
          exit $fail
